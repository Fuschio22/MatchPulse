<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Cagliari 2026/27 - Serie A</title>
    <style>
        :root {
            --cagliari-red: #c8102e;
            --cagliari-blue: #003da5;
            --bg-primary: #0a0a0a;
            --bg-card: #1a1a1a;
            --bg-card-hover: #242424;
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.7);
            --home: #00ff88;
            --away: #ffaa00;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 20px;
            padding-bottom: 100px;
        }
        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 3px solid var(--cagliari-red);
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, var(--cagliari-red), var(--cagliari-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .back-link {
            display: inline-block;
            color: var(--cagliari-red);
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 14px;
        }
        .live-banner {
            background: linear-gradient(135deg, var(--cagliari-red), var(--cagliari-blue));
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            margin-bottom: 20px;
        }
        .live-banner a {
            color: white;
            text-decoration: none;
            font-weight: 700;
        }
        .section-title {
            font-size: 18px;
            margin: 30px 0 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        .matchday {
            margin-bottom: 24px;
        }
        .matchday-header {
            background: var(--cagliari-red);
            color: white;
            padding: 12px 16px;
            border-radius: 8px 8px 0 0;
            font-weight: 700;
            font-size: 14px;
        }
        .match-card {
            background: var(--bg-card);
            border-radius: 0 0 8px 8px;
            padding: 16px;
            border-left: 4px solid var(--cagliari-red);
            margin-bottom: 8px;
        }
        .match-card.home {
            border-left-color: var(--home);
        }
        .match-card.away {
            border-left-color: var(--away);
        }
        .match-teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        .match-teams .vs {
            color: var(--text-secondary);
            font-size: 12px;
        }
        .match-date {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
        }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            margin-left: 8px;
        }
        .badge-home {
            background: var(--home);
            color: black;
        }
        .badge-away {
            background: var(--away);
            color: black;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        .stat-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: 800;
            color: var(--cagliari-red);
        }
        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        @media (max-width: 480px) {
            .stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
