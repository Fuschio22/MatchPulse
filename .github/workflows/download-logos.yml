name: Download Team Logos

on:
  workflow_dispatch:  # Permette di eseguire manualmente

jobs:
  download-logos:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # <-- QUESTO DÀ IL PERMESSO DI SALVARE I FILE
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Create assets/teams directory
        run: mkdir -p assets/teams
        
      - name: Download team logos
        run: |
          curl -sL "https://media.api-sports.io/football/teams/499.png" -o assets/teams/atalanta.png
          curl -sL "https://media.api-sports.io/football/teams/500.png" -o assets/teams/bologna.png
          curl -sL "https://media.api-sports.io/football/teams/490.png" -o assets/teams/cagliari.png
          curl -sL "https://media.api-sports.io/football/teams/511.png" -o assets/teams/como.png
          curl -sL "https://media.api-sports.io/football/teams/502.png" -o assets/teams/fiorentina.png
          curl -sL "https://media.api-sports.io/football/teams/512.png" -o assets/teams/frosinone.png
          curl -sL "https://media.api-sports.io/football/teams/495.png" -o assets/teams/genoa.png
          curl -sL "https://media.api-sports.io/football/teams/505.png" -o assets/teams/inter.png
          curl -sL "https://media.api-sports.io/football/teams/496.png" -o assets/teams/juventus.png
          curl -sL "https://media.api-sports.io/football/teams/487.png" -o assets/teams/lazio.png
          curl -sL "https://media.api-sports.io/football/teams/867.png" -o assets/teams/lecce.png
          curl -sL "https://media.api-sports.io/football/teams/489.png" -o assets/teams/milan.png
          curl -sL "https://media.api-sports.io/football/teams/1579.png" -o assets/teams/monza.png
          curl -sL "https://media.api-sports.io/football/teams/492.png" -o assets/teams/napoli.png
          curl -sL "https://media.api-sports.io/football/teams/523.png" -o assets/teams/parma.png
          curl -sL "https://media.api-sports.io/football/teams/497.png" -o assets/teams/roma.png
          curl -sL "https://media.api-sports.io/football/teams/488.png" -o assets/teams/sassuolo.png
          curl -sL "https://media.api-sports.io/football/teams/503.png" -o assets/teams/torino.png
          curl -sL "https://media.api-sports.io/football/teams/494.png" -o assets/teams/udinese.png
          curl -sL "https://media.api-sports.io/football/teams/517.png" -o assets/teams/venezia.png
          
      - name: Commit and push logos
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/teams/
          git commit -m "🎨 Download team logos from API-Football" || echo "No changes to commit"
          git push
